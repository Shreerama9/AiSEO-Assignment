version: "3.9"

services:
  aegis:
    build:
      context: .
      dockerfile: Dockerfile
    image: aegis-api:latest
    container_name: aegis-api
    ports:
      - "8000:8000"
    env_file:
      - .env  # copy .env.example → .env and set OPENAI_API_KEY
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: aegis-frontend:latest
    container_name: aegis-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_URL=http://aegis-api:8000
    depends_on:
      aegis:
        condition: service_healthy
    restart: unless-stopped
